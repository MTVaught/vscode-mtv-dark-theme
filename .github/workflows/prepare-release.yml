name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump to apply"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        id: version
        run: |
          npm version "${{ inputs.version_bump }}" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          branch="release/v$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git switch -c "${{ steps.version.outputs.branch }}"
          git add package.json package-lock.json
          git commit -m "Release ${{ steps.version.outputs.tag }}"

      - name: Push release branch
        run: |
          git push --set-upstream origin "${{ steps.version.outputs.branch }}"

      - name: Open release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.branch }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --body "Bumps the extension version to ${{ steps.version.outputs.version }}."

      - name: Dispatch build for release branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build.yml --ref "${{ steps.version.outputs.branch }}"
