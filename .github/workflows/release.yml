name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Nightly tag or commit SHA to promote"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Promote nightly to release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read extension version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Validate package contents
        run: npx --yes @vscode/vsce ls

      - name: Package extension
        id: package
        shell: bash
        run: |
          asset="vscode-mtvaught-dark-theme-${{ steps.version.outputs.version }}.vsix"
          npx --yes @vscode/vsce package
          vsix="$(ls *.vsix | head -n 1)"
          mv "$vsix" "$asset"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.asset }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Promoted from ${{ inputs.ref }}."

      # Enable this after the Marketplace publisher exists and VSCE_PAT has
      # been added as a repository secret. Keep this after validation/package
      # steps so Marketplace publishing only happens after the selected ref can
      # produce a valid VSIX.
      #
      # - name: Publish to VS Code Marketplace
      #   run: npx --yes @vscode/vsce publish
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
